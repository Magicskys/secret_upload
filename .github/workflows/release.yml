name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary_name: secret_upload
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            binary_name: secret_upload
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: secret_upload
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: secret_upload
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: secret_upload.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-musl" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
          fi

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            powershell Compress-Archive -Path ${{ matrix.binary_name }} -DestinationPath ../../../secret_upload-${{ matrix.target }}.zip
          else
            tar czf ../../../secret_upload-${{ matrix.target }}.tar.gz ${{ matrix.binary_name }}
          fi

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            secret_upload-${{ matrix.target }}.tar.gz
            secret_upload-${{ matrix.target }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
